apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: private-dns-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: private-dns-operator
subjects:
  - kind: ServiceAccount
    name: private-dns-operator
    namespace: private-dns-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: private-dns-operator-coredns
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: private-dns-operator-coredns
subjects:
  - kind: ServiceAccount
    name: private-dns-operator
    namespace: private-dns-system
