apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "private-dns-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "private-dns-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "private-dns-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "private-dns-operator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "private-dns-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            - --health-probe-bind-address={{ .Values.healthProbe.bindAddress }}
            - --coredns-namespace=$(PRIVATE_DNS_COREDNS_NAMESPACE)
            - --coredns-configmap=$(PRIVATE_DNS_COREDNS_CONFIGMAP)
            - --coredns-deployment=$(PRIVATE_DNS_COREDNS_DEPLOYMENT)
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: PRIVATE_DNS_COREDNS_NAMESPACE
              value: {{ .Values.coredns.namespace | quote }}
            - name: PRIVATE_DNS_COREDNS_CONFIGMAP
              value: {{ .Values.coredns.configMap | quote }}
            - name: PRIVATE_DNS_COREDNS_DEPLOYMENT
              value: {{ .Values.coredns.deployment | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
