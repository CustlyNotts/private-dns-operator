apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: privatednszones.dns.custlynotts.io
spec:
  group: dns.custlynotts.io
  scope: Cluster
  names:
    plural: privatednszones
    singular: privatednszone
    kind: PrivateDNSZone
    shortNames:
      - pdz
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Zone
          type: string
          jsonPath: .spec.zone
        - name: Policy
          type: string
          jsonPath: .spec.unresolvedRecordPolicy
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - zone
              properties:
                zone:
                  type: string
                ttl:
                  type: integer
                  format: int32
                  minimum: 1
                unresolvedRecordPolicy:
                  type: string
                  enum:
                    - Forward
                    - NXDOMAIN
                allowedNamespaces:
                  type: object
                  properties:
                    matchNames:
                      type: array
                      items:
                        type: string
                records:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - type
                      - values
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        enum:
                          - A
                          - AAAA
                          - CNAME
                          - TXT
                          - MX
                          - SRV
                      ttl:
                        type: integer
                        format: int32
                        minimum: 1
                      values:
                        type: array
                        minItems: 1
                        items:
                          type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                records:
                  type: integer
                serial:
                  type: string
                zoneFileKey:
                  type: string
                lastAppliedHash:
                  type: string
