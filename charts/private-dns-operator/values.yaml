replicaCount: 1

image:
  repository: ghcr.io/custlynotts/private-dns-operator
  tag: v1.0.1
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

leaderElection:
  enabled: true

metrics:
  bindAddress: ":8080"

healthProbe:
  bindAddress: ":8081"

coredns:
  namespace: kube-system
  configMap: coredns
  deployment: coredns

rbac:
  create: true


extraArgs: []
extraEnv: []
